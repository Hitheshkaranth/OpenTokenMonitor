# PR/push validation workflow.
# Note: `tauri build` is intentionally not run here due to CI cost/time;
# release packaging/signing is handled in `.github/workflows/release.yml`.
name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install JS dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt,clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Check formatting
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --all -- --check

      - name: Lint
        run: |
          # TODO: remove -A unused-mut once cleaned.
          cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings -A unused-mut

      - name: Run tests
        run: cargo test --manifest-path src-tauri/Cargo.toml --no-fail-fast
