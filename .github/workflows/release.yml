name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create_release.outputs.id }}
      upload_url: ${{ steps.create_release.outputs.upload_url }}
    steps:
      - name: Create draft GitHub release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true

  build:
    name: Build (${{ matrix.target }})
    needs: create-release
    runs-on: ${{ matrix.os }}
    env:
      HAS_APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE != '' && secrets.APPLE_CERTIFICATE_PASSWORD != '' }}
      HAS_APPLE_NOTARY: ${{ secrets.APPLE_ID != '' && secrets.APPLE_PASSWORD != '' && secrets.APPLE_TEAM_ID != '' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
            bundle_cmd: npm run tauri:build:mac
          - os: macos-15-intel
            target: x86_64-apple-darwin
            bundle_cmd: npm run tauri:build:mac
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bundle_cmd: npm run tauri:build:win

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install JS dependencies
        run: npm ci

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Import macOS code-signing certificate
        if: runner.os == 'macOS' && env.HAS_APPLE_CERTIFICATE == 'true'
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      # macOS Gatekeeper: for a release other Macs can open without the
      # "app is damaged / unidentified developer" prompt, the build must be
      # Developer ID signed AND notarized. Provide these repository secrets to
      # enable it. All are optional — when absent the build still succeeds with
      # the current ad-hoc / unsigned output, exactly as before:
      #   APPLE_CERTIFICATE, APPLE_CERTIFICATE_PASSWORD
      #     - Developer ID Application cert exported as base64-encoded .p12
      #   APPLE_SIGNING_IDENTITY
      #     - e.g. "Developer ID Application: Your Name (TEAMID)"
      #   APPLE_ID, APPLE_PASSWORD, APPLE_TEAM_ID
      #     - notarization: Apple ID, an app-specific password, and the team ID
      - name: Build Tauri bundle
        run: ${{ matrix.bundle_cmd }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Collect release artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "release-assets/${{ matrix.target }}"
          shopt -s nullglob

          artifacts=(
            src-tauri/target/release/bundle/macos/*.app.tar.gz
            src-tauri/target/release/bundle/macos/*.app.tar.gz.sig
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.exe.sig
          )

          if [ ${#artifacts[@]} -eq 0 ]; then
            echo "No release artifacts found" >&2
            find src-tauri/target/release/bundle -maxdepth 3 -type f 2>/dev/null || true
            exit 1
          fi

          cp "${artifacts[@]}" "release-assets/${{ matrix.target }}/"
          ls -la "release-assets/${{ matrix.target }}"

      - name: Upload build artifacts to draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          draft: true
          files: release-assets/${{ matrix.target }}/*

  publish-release:
    runs-on: ubuntu-latest
    needs:
      - create-release
      - build
    steps:
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          draft: false
