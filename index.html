<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="./open_token_monitor_icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenTokenMonitor</title>
    <!--
      Global startup error trap. Runs before the app bundle so that a failure
      during module evaluation or React mount is shown as a readable panel
      instead of a silent blank white window. If React has already mounted
      (the #otm-boot placeholder is gone) this does nothing.
    -->
    <script>
      (function () {
        function showFatal(message, stack) {
          var root = document.getElementById("root") || document.body;
          if (!document.getElementById("otm-boot")) return;
          root.innerHTML = "";
          var wrap = document.createElement("div");
          wrap.setAttribute(
            "style",
            "font-family:ui-monospace,Menlo,monospace;background:#0b1620;" +
              "color:#e7f1f8;height:100%;width:100%;box-sizing:border-box;" +
              "padding:20px;overflow:auto"
          );
          var head = document.createElement("div");
          head.setAttribute(
            "style",
            "color:#ff8a8a;font-weight:600;margin-bottom:8px"
          );
          head.textContent = "OpenTokenMonitor failed to start";
          var detail = document.createElement("div");
          detail.setAttribute(
            "style",
            "color:#9fb3c2;font-size:12px;white-space:pre-wrap;word-break:break-word"
          );
          detail.textContent =
            (message || "Unknown error") + (stack ? "\n\n" + stack : "");
          wrap.appendChild(head);
          wrap.appendChild(detail);
          root.appendChild(wrap);
        }
        window.addEventListener("error", function (e) {
          showFatal(e.message, e.error && e.error.stack);
        });
        window.addEventListener("unhandledrejection", function (e) {
          var reason = e.reason;
          showFatal(
            reason && reason.message ? reason.message : String(reason),
            reason && reason.stack
          );
        });
      })();
    </script>
  </head>

  <body>
    <!--
      #otm-boot is a CSS-independent placeholder (inline dark styles) so the
      window is never pure white before the bundle paints. React replaces the
      contents of #root on mount, removing it.
    -->
    <div id="root">
      <div
        id="otm-boot"
        style="font-family: ui-monospace, Menlo, monospace; background: #0b1620; color: #9fb3c2; height: 100%; width: 100%; display: flex; align-items: center; justify-content: center; font-size: 13px;"
      >
        Loading OpenTokenMonitor…
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
